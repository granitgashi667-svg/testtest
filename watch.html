<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AlbFilms24 - Watch Movie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: -1;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .nav-bar {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .back-btn {
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
        }
        .back-btn:hover {
            background: #e50914;
            border-color: #e50914;
            transform: translateX(-3px);
        }
        .servers {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 0 0 20px 0;
            flex-wrap: wrap;
        }
        .server-btn {
            background: #1e2026;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: #ccc;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            font-size: 14px;
        }
        .server-btn.active, .server-btn:hover {
            background: #e50914;
            color: white;
        }
        .movie-hero {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            background: rgba(20, 20, 30, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 40px;
            border-left: 5px solid #e50914;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.4);
        }
        .poster img {
            width: 280px;
            border-radius: 20px;
            box-shadow: 0 15px 25px -8px rgba(0,0,0,0.5);
        }
        .details {
            flex: 1;
        }
        .title {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff, #e50914);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 24px;
            font-size: 15px;
        }
        .meta span {
            background: #1e2026;
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .overview {
            margin-bottom: 24px;
            line-height: 1.6;
            color: #ddd;
            font-size: 16px;
        }
        .cast {
            color: #aaa;
            font-size: 14px;
        }
        .cast strong { color: #e50914; }
        .player-wrapper {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
            background: #000;
        }
        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }
        .points-action {
            text-align: center;
            margin-top: 30px;
        }
        .earn-points-btn {
            background: linear-gradient(135deg, #e50914, #b81d24);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .earn-points-btn:hover {
            transform: scale(1.02);
        }
        @media (max-width: 700px) {
            .poster img { width: 180px; }
            .title { font-size: 28px; }
            .movie-hero { padding: 20px; gap: 20px; }
            .server-btn { padding: 8px 16px; font-size: 12px; }
            .back-btn { padding: 8px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back to Home</button>
    </div>
    <div id="info" class="movie-hero"></div>
    <div class="servers" id="serverList"></div>
    <div class="player-wrapper">
        <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>
    <div class="points-action">
        <button id="earnPointsBtn" class="earn-points-btn"><i class="fas fa-coins"></i> I watched it - Earn 10 Points!</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ============ FIREBASE CONFIG (ZËVENDËSO ME TË DHËNAT E PROJEKTIT TËND) ============
    const firebaseConfig = {
        apiKey: "AIzaSyDummyReplaceWithYours",
        authDomain: "albfilms24.firebaseapp.com",
        projectId: "albfilms24",
        storageBucket: "albfilms24.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abc123"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const type = urlParams.get('type') || 'movie';
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const BACKDROP = 'https://image.tmdb.org/t/p/original';

    let currentServer = 'vidsrc';

    // ============ PËRCAKTO SERVERËT ============
    const servers = {
        vidsrc: {
            name: 'Server 1 (VidSrc)',
            getUrl: (id, type) => {
                if (type === 'movie') return `https://vidsrcme.ru/embed/movie/${id}`;
                return `https://vidsrcme.ru/embed/tv/${id}/1/1`;
            }
        },
        multiembed: {
            name: 'Server 2 (MultiEmbed - AirPlay friendly)',
            getUrl: (id, type) => {
                if (type === 'movie') return `https://multiembed.mov/?video_id=${id}&tmdb=1`;
                return `https://multiembed.mov/?video_id=${id}&tmdb=1&tv=1`;
            }
        },
        embed2: {
            name: 'Server 3 (2Embed)',
            getUrl: (id, type) => {
                if (type === 'movie') return `https://www.2embed.cc/embed/${id}`;
                return `https://www.2embed.cc/embedtv/${id}&season=1&episode=1`;
            }
        }
    };

    function loadVideo() {
        const server = servers[currentServer];
        if (server && id) {
            const embedUrl = server.getUrl(id, type);
            document.getElementById('player').src = embedUrl;
        } else {
            document.getElementById('player').src = '';
        }
    }

    async function loadMovieDetails() {
        if (!id) return;
        try {
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=en-US&append_to_response=credits`);
            const data = await res.json();
            const title = data.title || data.name;
            const year = (data.release_date || data.first_air_date || '').split('-')[0] || 'N/A';
            const rating = data.vote_average?.toFixed(1) || 'N/A';
            const runtime = data.runtime ? `${data.runtime} min` : (data.number_of_episodes ? `${data.number_of_episodes} eps` : 'N/A');
            const cast = data.credits?.cast?.slice(0, 5).map(c => c.name).join(', ') || 'Information not available';
            const poster = data.poster_path ? IMG + data.poster_path : '';
            const overview = data.overview || 'No description available.';
            const backdrop = data.backdrop_path ? BACKDROP + data.backdrop_path : '';
            if (backdrop) document.body.style.backgroundImage = `url('${backdrop}')`;
            document.getElementById('info').innerHTML = `
                <div class="poster"><img src="${poster}" alt="${title}"></div>
                <div class="details">
                    <div class="title">${title}</div>
                    <div class="meta">
                        <span><i class="fas fa-calendar-alt"></i> ${year}</span>
                        <span><i class="fas fa-star"></i> ${rating}/10</span>
                        <span><i class="fas fa-clock"></i> ${runtime}</span>
                    </div>
                    <div class="overview">${overview}</div>
                    <div class="cast"><i class="fas fa-users"></i> <strong>Cast:</strong> ${cast}</div>
                </div>
            `;
            // Krijo butonat e serverëve
            const serverContainer = document.getElementById('serverList');
            serverContainer.innerHTML = '';
            Object.keys(servers).forEach(key => {
                const btn = document.createElement('button');
                btn.textContent = servers[key].name;
                btn.className = `server-btn ${key === currentServer ? 'active' : ''}`;
                btn.onclick = () => {
                    currentServer = key;
                    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadVideo();
                };
                serverContainer.appendChild(btn);
            });
            loadVideo();
        } catch (error) {
            console.error('Error loading details:', error);
            document.getElementById('info').innerHTML = '<div class="details">Error loading movie details. Please try again later.</div>';
        }
    }

    // Pikët (Points)
    const earnBtn = document.getElementById('earnPointsBtn');
    if (earnBtn) {
        earnBtn.addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) {
                alert('Please login first to earn points!');
                return;
            }
            try {
                const userRef = doc(db, 'users', user.uid);
                await updateDoc(userRef, { points: increment(10) });
                alert('+10 points! Thank you for watching.');
                earnBtn.disabled = true;
                earnBtn.style.opacity = '0.5';
            } catch (error) {
                console.error('Error adding points:', error);
                alert('Could not add points. Make sure you are logged in.');
            }
        });
    }

    loadMovieDetails();
</script>
</body>
</html>
