<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - Watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #0a0a0f; color:#fff; font-family:'Inter',sans-serif; min-height:100vh; background-size:cover; background-position:center; background-attachment:fixed; }
        body::before { content:''; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75); z-index:-1; }
        .container { max-width:1200px; margin:0 auto; padding:30px 20px; }
        .nav-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .logo { font-size:24px; font-weight:800; background:linear-gradient(135deg,#fff,#e50914); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .back-btn { background:#1e2026; border:1px solid #e50914; padding:10px 24px; border-radius:40px; color:white; cursor:pointer; }
        .movie-hero { display:flex; gap:40px; flex-wrap:wrap; background:rgba(15,20,30,0.85); backdrop-filter:blur(10px); border-radius:28px; padding:30px; margin-bottom:40px; border-left:5px solid #e50914; }
        .poster img { width:280px; border-radius:20px; }
        .details { flex:1; }
        .title { font-size:38px; font-weight:800; margin-bottom:16px; color:#e50914; }
        .meta { display:flex; gap:15px; margin-bottom:20px; }
        .meta span { background:#1e2026; padding:5px 14px; border-radius:30px; }
        .overview { margin-bottom:20px; line-height:1.6; }
        .cast { color:#aaa; }
        .player-wrapper { border-radius:24px; overflow:hidden; box-shadow:0 15px 30px rgba(0,0,0,0.5); }
        iframe { width:100%; aspect-ratio:16/9; border:none; }
        @media (max-width:700px){ .poster img { width:180px; } .title { font-size:28px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar"><div class="logo">AlbFilms<span style="color:#e50914;">24</span></div><button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button></div>
    <div id="info" class="movie-hero"></div>
    <div class="player-wrapper"><iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe></div>
</div>
<script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const type = params.get('type') || 'movie';
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const BACKDROP = 'https://image.tmdb.org/t/p/original';

    async function loadDetails() {
        if (!id) return;
        const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=en-US&append_to_response=credits`);
        const data = await res.json();
        const title = data.title || data.name;
        const year = (data.release_date || data.first_air_date || '').split('-')[0] || 'N/A';
        const rating = data.vote_average?.toFixed(1) || 'N/A';
        const runtime = data.runtime ? `${data.runtime} min` : (data.number_of_episodes ? `${data.number_of_episodes} eps` : 'N/A');
        const cast = data.credits?.cast?.slice(0,6).map(c=>c.name).join(', ') || 'N/A';
        const poster = data.poster_path ? IMG+data.poster_path : '';
        const overview = data.overview || 'No description.';
        const backdrop = data.backdrop_path ? BACKDROP+data.backdrop_path : '';
        if (backdrop) document.body.style.backgroundImage = `url('${backdrop}')`;
        document.getElementById('info').innerHTML = `<div class="poster"><img src="${poster}" alt="${title}"></div><div class="details"><div class="title">${title}</div><div class="meta"><span>📅 ${year}</span><span>⭐ ${rating}/10</span><span>⏱️ ${runtime}</span></div><div class="overview">${overview}</div><div class="cast"><i class="fas fa-users"></i> <strong>Cast:</strong> ${cast}</div></div>`;
        let embedUrl = type === 'movie' ? `https://vidsrcme.ru/embed/movie/${id}` : `https://vidsrcme.ru/embed/tv/${id}/1/1`;
        document.getElementById('player').src = embedUrl;
    }
    loadDetails();
</script>
</body>
</html>
