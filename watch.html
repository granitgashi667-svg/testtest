<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - Watch Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f1115;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .back-btn {
            background: #1e2026;
            border: 1px solid #f5c518;
            color: #f5c518;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 30px;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #f5c518;
            color: #0f1115;
        }
        .movie-hero {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
            background: #16181e;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 30px;
            border-left: 5px solid #f5c518;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .poster img {
            width: 280px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .details {
            flex: 1;
        }
        .title {
            font-size: 38px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            margin-bottom: 16px;
            color: #f5c518;
        }
        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 15px;
        }
        .meta span {
            background: #1e2026;
            padding: 6px 14px;
            border-radius: 30px;
        }
        .overview {
            margin-bottom: 20px;
            line-height: 1.6;
            color: #ccc;
        }
        .cast {
            color: #aaa;
            font-size: 14px;
        }
        .player-wrapper {
            margin-top: 20px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
        }
        @media (max-width: 700px) {
            .poster img { width: 180px; }
            .title { font-size: 28px; }
            .movie-hero { padding: 15px; gap: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <div id="info" class="movie-hero"></div>
    <div class="player-wrapper">
        <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const type = params.get('type') || 'movie';
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';

    async function loadDetails() {
        if (!id) return;
        try {
            const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=en-US&append_to_response=credits`);
            const data = await res.json();
            const title = data.title || data.name;
            const year = (data.release_date || data.first_air_date || '').split('-')[0] || 'N/A';
            const rating = data.vote_average?.toFixed(1) || 'N/A';
            const runtime = data.runtime ? `${data.runtime} min` : (data.number_of_episodes ? `${data.number_of_episodes} episodes` : 'N/A');
            const cast = data.credits?.cast?.slice(0, 8).map(c => c.name).join(', ') || 'Information not available';
            const poster = data.poster_path ? IMG_URL + data.poster_path : '';
            const overview = data.overview || 'No description available.';
            document.getElementById('info').innerHTML = `
                <div class="poster"><img src="${poster}" alt="${title}"></div>
                <div class="details">
                    <div class="title">${title}</div>
                    <div class="meta">
                        <span><i class="fas fa-calendar-alt"></i> ${year}</span>
                        <span><i class="fas fa-star"></i> ${rating}/10</span>
                        <span><i class="fas fa-clock"></i> ${runtime}</span>
                    </div>
                    <div class="overview">${overview}</div>
                    <div class="cast"><i class="fas fa-users"></i> <strong>Cast:</strong> ${cast}</div>
                </div>
            `;
            let embedUrl = '';
            if (type === 'movie') embedUrl = `https://vidsrcme.ru/embed/movie/${id}`;
            else embedUrl = `https://vidsrcme.ru/embed/tv/${id}/1/1`;
            document.getElementById('player').src = embedUrl;
        } catch (error) {
            document.getElementById('info').innerHTML = '<div class="details">Error loading details</div>';
        }
    }
    loadDetails();
</script>
</body>
</html>
