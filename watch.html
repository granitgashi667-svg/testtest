<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AlbFilms24 - Watch</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"><style>
body{background:#101214;color:#eee;font-family:'Inter',sans-serif;margin:0;padding:20px}.container{max-width:1100px;margin:auto}.back-btn{background:#1e2024;border:1px solid #e50914;color:#e50914;padding:8px 24px;border-radius:30px;cursor:pointer;margin-bottom:25px}.movie-hero{display:flex;gap:30px;flex-wrap:wrap;background:#1a1c20;border-radius:24px;padding:25px;margin-bottom:30px}.poster img{width:260px;border-radius:16px}.details{flex:1}.title{font-size:34px;font-weight:700;margin-bottom:12px;color:#e50914}.meta{display:flex;gap:15px;margin-bottom:20px}.meta span{background:#2a2c30;padding:5px 12px;border-radius:20px;font-size:13px}.overview{margin-bottom:20px;line-height:1.5}.cast{color:#aaa;font-size:14px}.player-wrapper{margin-top:20px;border-radius:20px;overflow:hidden}iframe{width:100%;aspect-ratio:16/9;border:none}@media(max-width:700px){.poster img{width:160px}.title{font-size:26px}}
</style></head>
<body><div class="container"><button class="back-btn" onclick="history.back()">← Back</button><div id="info" class="movie-hero"></div><div class="player-wrapper"><iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe></div></div>
<script>
const params=new URLSearchParams(location.search),id=params.get('id'),type=params.get('type')||'movie',API_KEY='7a98db423d6e3a5ee922a3e51a09d135',IMG='https://image.tmdb.org/t/p/w500';
async function loadDetails(){if(!id)return;const res=await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=en-US&append_to_response=credits`);const data=await res.json();const title=data.title||data.name,year=(data.release_date||data.first_air_date||'').split('-')[0]||'N/A',rating=data.vote_average?.toFixed(1)||'N/A',runtime=data.runtime?`${data.runtime} min`:(data.number_of_episodes?`${data.number_of_episodes} eps`:'N/A'),cast=data.credits?.cast?.slice(0,6).map(c=>c.name).join(', ')||'N/A',poster=data.poster_path?IMG+data.poster_path:'',overview=data.overview||'No description.';document.getElementById('info').innerHTML=`<div class="poster"><img src="${poster}" alt="${title}"></div><div class="details"><div class="title">${title}</div><div class="meta"><span>📅 ${year}</span><span>⭐ ${rating}/10</span><span>⏱️ ${runtime}</span></div><div class="overview">${overview}</div><div class="cast"><i class="fas fa-users"></i> <strong>Cast:</strong> ${cast}</div></div>`;let embedUrl=type==='movie'?`https://vidsrcme.ru/embed/movie/${id}`:`https://vidsrcme.ru/embed/tv/${id}/1/1`;document.getElementById('player').src=embedUrl;}
loadDetails();
</script></body></html>
