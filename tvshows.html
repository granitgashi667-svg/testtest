<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AlbFilms24 - TV Shows (500+ Series)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; }
        .sidebar {
            position: fixed; left: 0; top: 0; width: 80px; height: 100vh;
            background: rgba(10,10,15,0.96); backdrop-filter: blur(12px);
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 30px 0; z-index: 100;
            border-right: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-top, .sidebar-bottom { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .sidebar a {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #aaa; gap: 5px; transition: 0.2s;
            font-size: 11px; font-weight: 500;
        }
        .sidebar a i { font-size: 24px; }
        .sidebar a span { font-size: 11px; }
        .sidebar a:hover, .sidebar a.active { color: #e50914; transform: translateY(-3px); }
        .main { margin-left: 80px; padding: 20px 40px; max-width: calc(100% - 80px); }
        .page-header { margin-bottom: 30px; }
        .page-header h1 {
            font-size: 36px; font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #fff, #e50914);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; margin-bottom: 10px;
        }
        .search-bar { display: flex; justify-content: center; margin: 20px 0; }
        .search-bar input {
            width: 60%; max-width: 500px; padding: 14px 24px; border-radius: 60px;
            border: none; background: #1e2026; color: white; font-size: 16px;
            text-align: center; outline: none; border: 1px solid #333;
        }
        .search-bar input:focus { border-color: #e50914; background: #2a2c30; }
        .genre-buttons {
            display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
            margin: 20px 0 30px;
        }
        .genre-btn {
            background: #1e2026; border: none; padding: 8px 24px; border-radius: 40px;
            color: #ccc; cursor: pointer; transition: 0.2s; font-size: 14px;
        }
        .genre-btn.active, .genre-btn:hover { background: #e50914; color: white; }
        .tv-grid {
            display: grid; grid-template-columns: repeat(6, 1fr);
            gap: 25px; margin: 30px 0;
        }
        .tv-card {
            background: #181a24; border-radius: 14px; overflow: hidden;
            transition: transform 0.25s; cursor: pointer; position: relative;
        }
        .tv-card:hover { transform: translateY(-6px); box-shadow: 0 12px 20px rgba(0,0,0,0.4); }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 12px; }
        .card-info h4 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info p { font-size: 12px; color: #aaa; }
        .card-icons {
            position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 20;
        }
        .favorite-btn, .watchlater-btn {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            border-radius: 50%; width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .favorite-btn i, .watchlater-btn i { font-size: 18px; }
        .favorite-btn i.fas { color: #e50914; }
        .favorite-btn i.far { color: #fff; }
        .watchlater-btn i.fas { color: #4caf50; }
        .watchlater-btn i.far { color: #fff; }
        .favorite-btn:hover, .watchlater-btn:hover { transform: scale(1.1); background: rgba(0,0,0,0.8); }
        .pagination {
            display: flex; justify-content: center; gap: 12px; margin: 30px 0;
        }
        .page-btn {
            background: #1e2026; border: none; padding: 8px 14px;
            border-radius: 30px; color: #ccc; cursor: pointer;
            font-size: 14px;
        }
        .page-btn.active, .page-btn:hover { background: #e50914; color: white; }
        .footer {
            margin-top: 60px; background: #0c0e12; border-radius: 30px 30px 0 0;
            padding: 30px; text-align: center; font-size: 12px; color: #888;
        }
        .toast {
            position: fixed; bottom: 30px; right: 30px; background: #e50914;
            padding: 10px 20px; border-radius: 30px; opacity: 0; transition: 0.3s;
            z-index: 3500;
        }
        .toast.show { opacity: 1; }
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; bottom: 0; top: auto; left: 0; width: 100%;
                height: 65px; flex-direction: row; justify-content: space-around;
                padding: 8px 10px; background: rgba(10,10,15,0.98);
                border-right: none; border-top: 1px solid rgba(255,255,255,0.08);
                z-index: 200;
            }
            .sidebar-top, .sidebar-bottom { flex-direction: row; gap: 20px; margin: 0; }
            .sidebar a span { display: none; }
            .sidebar a i { font-size: 24px; }
            .main { margin-left: 0; padding: 15px 12px; max-width: 100%; margin-bottom: 65px; }
            .tv-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .page-btn { padding: 6px 12px; font-size: 12px; }
        }
        @media (max-width: 480px) {
            .tv-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>

</script>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-top">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="index.html"><i class="fas fa-film"></i><span>Movies</span></a>
        <a href="tvshows.html" class="active"><i class="fas fa-tv"></i><span>TV Shows</span></a>
        <a href="#"><i class="fas fa-heart"></i><span>Favorites</span></a>
        <a href="#"><i class="fas fa-clock"></i><span>Watch Later</span></a>
    </div>
    <div class="sidebar-bottom">
        <a href="#" id="userIconSidebar"><i class="fas fa-user-circle"></i><span>Login</span></a>
    </div>
</div>

<div class="main">
    <div class="page-header">
        <h1>TV SHOWS</h1>
        <div class="search-bar">
            <input type="text" id="searchTV" placeholder="Search TV shows...">
        </div>
        <div class="genre-buttons" id="genreButtons">
            <button data-genre="10768" class="genre-btn active">War & Politics</button>
            <button data-genre="28" class="genre-btn">Action</button>
            <button data-genre="35" class="genre-btn">Comedy</button>
            <button data-genre="18" class="genre-btn">Drama</button>
            <button data-genre="80" class="genre-btn">Crime</button>
            <button data-genre="99" class="genre-btn">Documentary</button>
            <button data-genre="16" class="genre-btn">Animation</button>
            <button data-genre="10765" class="genre-btn">Sci-Fi & Fantasy</button>
        </div>
    </div>

    <div class="tv-grid" id="tvShowsGrid"></div>
    <div class="pagination" id="tvPagination"></div>
    
    <div class="footer">
        <p>&copy; 2025 AlbFilms24. All rights reserved.</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const BASE = 'https://api.themoviedb.org/3';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    let currentGenre = 10768;
    let currentPage = 1;
    let totalPages = 1;
    let currentSearch = '';
    
    let favorites = JSON.parse(localStorage.getItem('alb_favorites')) || [];
    let watchlist = JSON.parse(localStorage.getItem('alb_watchlist')) || [];
    
    function saveFavorites() { localStorage.setItem('alb_favorites', JSON.stringify(favorites)); }
    function saveWatchlist() { localStorage.setItem('alb_watchlist', JSON.stringify(watchlist)); }
    
    function isFavorite(id, type) { return favorites.some(f => f.id == id && f.type === type); }
    function isWatchlist(id, type) { return watchlist.some(w => w.id == id && w.type === type); }
    
    function updateIcons(id, type) {
        const isFav = isFavorite(id, type);
        const isWatch = isWatchlist(id, type);
        document.querySelectorAll(`.favorite-btn[data-id="${id}"][data-type="${type}"]`).forEach(btn => {
            const icon = btn.querySelector('i');
            if (isFav) icon.className = 'fas fa-heart';
            else icon.className = 'far fa-heart';
        });
        document.querySelectorAll(`.watchlater-btn[data-id="${id}"][data-type="${type}"]`).forEach(btn => {
            const icon = btn.querySelector('i');
            if (isWatch) icon.className = 'fas fa-clock';
            else icon.className = 'far fa-clock';
        });
    }
    
    function addFavorite(item) {
        if (!isFavorite(item.id, item.type)) {
            favorites.push({ id: item.id, type: item.type, title: item.title, poster: item.poster });
            saveFavorites();
            showToast(`❤️ "${item.title}" added to favorites`);
            updateIcons(item.id, item.type);
        }
    }
    function removeFavorite(id, type) {
        const idx = favorites.findIndex(f => f.id == id && f.type === type);
        if (idx !== -1) {
            favorites.splice(idx, 1);
            saveFavorites();
            showToast(`💔 Removed from favorites`);
            updateIcons(id, type);
        }
    }
    function toggleFavorite(id, type, title, poster) {
        if (isFavorite(id, type)) removeFavorite(id, type);
        else addFavorite({ id, type, title, poster });
    }
    
    function addWatchlist(item) {
        if (!isWatchlist(item.id, item.type)) {
            watchlist.push({ id: item.id, type: item.type, title: item.title, poster: item.poster });
            saveWatchlist();
            showToast(`⏰ "${item.title}" added to watch later`);
            updateIcons(item.id, item.type);
        }
    }
    function removeWatchlist(id, type) {
        const idx = watchlist.findIndex(w => w.id == id && w.type === type);
        if (idx !== -1) {
            watchlist.splice(idx, 1);
            saveWatchlist();
            showToast(`⏰ Removed from watch later`);
            updateIcons(id, type);
        }
    }
    function toggleWatchlist(id, type, title, poster) {
        if (isWatchlist(id, type)) removeWatchlist(id, type);
        else addWatchlist({ id, type, title, poster });
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function createCard(show) {
        const card = document.createElement('div');
        card.className = 'tv-card';
        const id = show.id;
        const type = 'tv';
        const title = show.name;
        const year = (show.first_air_date || '').split('-')[0] || 'N/A';
        const rating = show.vote_average ? show.vote_average.toFixed(1) : '?';
        const poster = show.poster_path || '';
        const isFav = isFavorite(id, type);
        const isWatch = isWatchlist(id, type);
        
        card.innerHTML = `
            <div class="card-icons">
                <div class="favorite-btn" data-id="${id}" data-type="${type}" data-title="${title.replace(/'/g, "\\'")}" data-poster="${poster}">
                    <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                </div>
                <div class="watchlater-btn" data-id="${id}" data-type="${type}" data-title="${title.replace(/'/g, "\\'")}" data-poster="${poster}">
                    <i class="${isWatch ? 'fas' : 'far'} fa-clock"></i>
                </div>
            </div>
            <img class="poster" src="${poster ? IMG+poster : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${title}">
            <div class="card-info">
                <h4>${title}</h4>
                <p>${year} ⭐ ${rating}</p>
            </div>
        `;
        
        card.addEventListener('click', (e) => {
            if (e.target.closest('.favorite-btn') || e.target.closest('.watchlater-btn')) return;
            window.location.href = `tv.html?id=${id}`;
        });
        
        const favBtn = card.querySelector('.favorite-btn');
        const watchBtn = card.querySelector('.watchlater-btn');
        favBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFavorite(id, type, title, poster);
        });
        watchBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleWatchlist(id, type, title, poster);
        });
        
        return card;
    }
    
    async function loadTVShows(page = 1, genre = currentGenre, search = '') {
        const grid = document.getElementById('tvShowsGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">Loading TV shows...</div>';
        let url = (search && search.length >= 3) 
            ? `${BASE}/search/tv?api_key=${API_KEY}&query=${encodeURIComponent(search)}&language=en-US&page=${page}`
            : `${BASE}/discover/tv?api_key=${API_KEY}&with_genres=${genre}&sort_by=popularity.desc&language=en-US&page=${page}`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            totalPages = Math.min(data.total_pages, 8);
            grid.innerHTML = '';
            if (!data.results.length) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">No TV shows found. Try another genre.</div>';
                return;
            }
            data.results.forEach(show => {
                if (show.poster_path) grid.appendChild(createCard(show));
            });
            
            const pagDiv = document.getElementById('tvPagination');
            pagDiv.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = `page-btn ${i === page ? 'active' : ''}`;
                btn.onclick = () => {
                    currentPage = i;
                    loadTVShows(i, currentGenre, currentSearch);
                    document.querySelector('.tv-grid')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                pagDiv.appendChild(btn);
            }
        } catch(e) {
            console.error(e);
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">Error loading TV shows</div>';
        }
    }
    
    document.getElementById('searchTV').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        if (currentSearch.length >= 3) {
            currentPage = 1;
            loadTVShows(1, currentGenre, currentSearch);
        } else if (currentSearch.length === 0) {
            currentPage = 1;
            loadTVShows(1, currentGenre, '');
        } else {
            document.getElementById('tvShowsGrid').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">Type at least 3 letters...</div>';
        }
    });
    
    document.querySelectorAll('.genre-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGenre = parseInt(btn.dataset.genre);
            currentSearch = '';
            document.getElementById('searchTV').value = '';
            currentPage = 1;
            loadTVShows(1, currentGenre, '');
        };
    });
    
    document.getElementById('userIconSidebar').onclick = () => showToast('Demo login (Firebase ready)');
    
    loadTVShows(1, 10768, '');
</script>
</body>
</html>
