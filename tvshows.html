<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - TV Shows</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Sidebar identik me atë të index.html */
        .sidebar {
            position: fixed; left: 0; top: 0; width: 80px; height: 100vh;
            background: rgba(10,10,15,0.96); backdrop-filter: blur(12px);
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 30px 0;
            z-index: 100; border-right: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-top { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .sidebar-bottom { margin-bottom: 20px; }
        .sidebar a {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #aaa; gap: 5px;
            transition: 0.2s; font-size: 11px; font-weight: 500;
        }
        .sidebar a i { font-size: 24px; }
        .sidebar a span { font-size: 11px; }
        .sidebar a:hover, .sidebar a.active { color: #e50914; transform: translateY(-3px); }
        
        .main { margin-left: 80px; padding: 20px 40px; max-width: calc(100% - 80px); }
        
        .page-header {
            margin-bottom: 30px;
        }
        .page-header h1 {
            font-size: 36px;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #fff, #e50914);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .search-bar {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .search-bar input {
            width: 60%;
            max-width: 500px;
            padding: 14px 24px;
            border-radius: 60px;
            border: none;
            background: #1e2026;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            border: 1px solid #333;
            transition: 0.2s;
        }
        .search-bar input:focus {
            border-color: #e50914;
            background: #2a2c30;
        }
        .genre-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 20px 0 30px;
        }
        .genre-btn {
            background: #1e2026;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .genre-btn.active, .genre-btn:hover {
            background: #e50914;
            color: white;
        }
        .tv-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 25px;
            margin: 30px 0;
        }
        @media (max-width: 1200px) { .tv-grid { grid-template-columns: repeat(4,1fr); } }
        @media (max-width: 800px) { .tv-grid { grid-template-columns: repeat(3,1fr); } }
        .tv-card {
            background: #181a24;
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.25s;
            cursor: pointer;
        }
        .tv-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.4);
        }
        .poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .card-info {
            padding: 12px;
        }
        .card-info h4 {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-info p {
            font-size: 12px;
            color: #aaa;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
        }
        .page-btn {
            background: #1e2026;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: #ccc;
            cursor: pointer;
        }
        .page-btn.active, .page-btn:hover {
            background: #e50914;
            color: white;
        }
        .footer {
            margin-top: 60px;
            background: #0c0e12;
            border-radius: 30px 30px 0 0;
            padding: 30px;
            text-align: center;
            font-size: 12px;
            color: #888;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #e50914;
            padding: 10px 20px;
            border-radius: 30px;
            opacity: 0;
            transition: 0.3s;
            z-index: 3500;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-top">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="index.html"><i class="fas fa-film"></i><span>Movies</span></a>
        <a href="tvshows.html" class="active"><i class="fas fa-tv"></i><span>TV Shows</span></a>
        <a href="#"><i class="fas fa-heart"></i><span>Favorites</span></a>
    </div>
    <div class="sidebar-bottom">
        <a href="#" id="userIconSidebar"><i class="fas fa-user-circle"></i><span>Login</span></a>
    </div>
</div>

<div class="main">
    <div class="page-header">
        <h1>TV SHOWS</h1>
        <div class="search-bar">
            <input type="text" id="searchTV" placeholder="Search TV shows...">
        </div>
        <div class="genre-buttons" id="genreButtons">
            <button data-genre="28" class="genre-btn active">Action</button>
            <button data-genre="35" class="genre-btn">Comedy</button>
            <button data-genre="18" class="genre-btn">Drama</button>
            <button data-genre="80" class="genre-btn">Crime</button>
            <button data-genre="99" class="genre-btn">Documentary</button>
            <button data-genre="16" class="genre-btn">Animation</button>
            <button data-genre="10765" class="genre-btn">Sci-Fi & Fantasy</button>
            <button data-genre="10768" class="genre-btn">War & Politics</button>
        </div>
    </div>

    <div class="tv-grid" id="tvShowsGrid"></div>
    <div class="pagination" id="tvPagination"></div>
    <div class="footer">
        <p>&copy; 2025 AlbFilms24. All rights reserved.</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const BASE = 'https://api.themoviedb.org/3';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    let currentGenre = 28;
    let currentPage = 1;
    let totalPages = 1;
    let currentSearch = '';

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function createCard(show) {
        const card = document.createElement('div');
        card.className = 'tv-card';
        const title = show.name;
        const year = (show.first_air_date || '').split('-')[0] || 'N/A';
        const rating = show.vote_average ? show.vote_average.toFixed(1) : '?';
        card.innerHTML = `
            <img class="poster" src="${show.poster_path ? IMG+show.poster_path : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${title}">
            <div class="card-info"><h4>${title}</h4><p>${year} ⭐ ${rating}</p></div>
        `;
        card.onclick = () => window.location.href = `tv.html?id=${show.id}`;
        return card;
    }

    async function loadTVShows(page = 1, genre = currentGenre, search = '') {
        const grid = document.getElementById('tvShowsGrid');
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center; padding:40px;">Loading TV shows...</div>';
        let url = '';
        if (search && search.length >= 3) {
            url = `${BASE}/search/tv?api_key=${API_KEY}&query=${encodeURIComponent(search)}&language=en-US&page=${page}`;
        } else {
            // Remove vote_count.gte to get more results, and increase page limit
            url = `${BASE}/discover/tv?api_key=${API_KEY}&with_genres=${genre}&sort_by=popularity.desc&language=en-US&page=${page}`;
        }
        try {
            const res = await fetch(url);
            const data = await res.json();
            totalPages = Math.min(data.total_pages, 8);
            grid.innerHTML = '';
            if (data.results.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center; padding:40px;">No TV shows found. Try another genre or search.</div>';
                return;
            }
            data.results.forEach(show => {
                if (show.poster_path) grid.appendChild(createCard(show));
            });
            const pagDiv = document.getElementById('tvPagination');
            pagDiv.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = `page-btn ${i === page ? 'active' : ''}`;
                btn.onclick = () => {
                    currentPage = i;
                    loadTVShows(i, currentGenre, currentSearch);
                };
                pagDiv.appendChild(btn);
            }
        } catch(e) {
            console.error(e);
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;">Error loading TV shows</div>';
        }
    }

    // Event listeners
    document.getElementById('searchTV').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        if (currentSearch.length >= 3) {
            currentPage = 1;
            loadTVShows(1, currentGenre, currentSearch);
        } else if (currentSearch.length === 0) {
            currentPage = 1;
            loadTVShows(1, currentGenre, '');
        } else {
            document.getElementById('tvShowsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center; padding:40px;">Type at least 3 letters...</div>';
        }
    });

    document.querySelectorAll('.genre-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGenre = parseInt(btn.dataset.genre);
            currentSearch = '';
            document.getElementById('searchTV').value = '';
            currentPage = 1;
            loadTVShows(1, currentGenre, '');
        };
    });

    document.getElementById('userIconSidebar').onclick = () => showToast('Demo login (Firebase ready)');

    // Initial load - shumë seriale nga Action
    loadTVShows(1, 28, '');
</script>
</body>
</html>
