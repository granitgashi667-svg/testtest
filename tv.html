<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - TV Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a0f; color:#fff; font-family:'Inter',sans-serif; min-height:100vh; background-size:cover; background-attachment:fixed; }
        body::before { content:''; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8); z-index:-1; }
        .container { max-width:1200px; margin:0 auto; padding:30px 20px; }
        .nav-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .logo { font-size:24px; font-weight:800; background:linear-gradient(135deg,#fff,#e50914); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .back-btn { background:#1e2026; border:1px solid #e50914; padding:10px 24px; border-radius:40px; color:white; cursor:pointer; }
        .series-hero { display:flex; gap:40px; flex-wrap:wrap; background:rgba(15,20,30,0.85); backdrop-filter:blur(10px); border-radius:28px; padding:30px; margin-bottom:40px; border-left:5px solid #e50914; }
        .poster img { width:260px; border-radius:20px; }
        .details { flex:1; }
        .title { font-size:38px; font-weight:800; margin-bottom:16px; color:#e50914; }
        .meta { display:flex; gap:15px; margin-bottom:20px; }
        .season-selector { margin:20px 0; display:flex; gap:12px; flex-wrap:wrap; }
        .season-btn { background:#1e2026; border:none; padding:8px 20px; border-radius:40px; color:white; cursor:pointer; }
        .season-btn.active { background:#e50914; }
        .episodes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:15px; margin:30px 0; }
        .episode-card { background:#1a1c24; border-radius:16px; padding:15px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:0.2s; }
        .episode-card:hover { background:#e50914; transform:scale(1.01); }
        .player-wrapper { margin-top:30px; border-radius:24px; overflow:hidden; }
        iframe { width:100%; aspect-ratio:16/9; border:none; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar"><div class="logo">AlbFilms<span style="color:#e50914;">24</span></div><button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button></div>
    <div id="info" class="series-hero"></div>
    <div id="seasons"></div>
    <div id="episodesList" class="episodes-grid"></div>
    <div id="playerContainer" class="player-wrapper" style="display:none;"><iframe id="player" allowfullscreen></iframe></div>
</div>
<script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const BACKDROP = 'https://image.tmdb.org/t/p/original';
    let tvData, currentSeason = 1;
    async function loadTV() {
        if (!id) return;
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=en-US`);
        tvData = await res.json();
        const backdrop = tvData.backdrop_path ? BACKDROP+tvData.backdrop_path : '';
        if (backdrop) document.body.style.backgroundImage = `url('${backdrop}')`;
        document.getElementById('info').innerHTML = `<div class="poster"><img src="${tvData.poster_path?IMG+tvData.poster_path:''}" alt="${tvData.name}"></div><div class="details"><div class="title">${tvData.name}</div><div class="meta"><span>📅 ${tvData.first_air_date?.split('-')[0]||'N/A'}</span><span>⭐ ${tvData.vote_average?.toFixed(1)}/10</span><span>🎬 ${tvData.number_of_seasons} Seasons</span></div><div class="overview">${tvData.overview||'No description.'}</div></div>`;
        loadSeasons();
    }
    function loadSeasons() {
        const seasonsDiv = document.getElementById('seasons');
        seasonsDiv.innerHTML = '<div class="season-selector"></div>';
        tvData.seasons.forEach(season => {
            if (season.season_number===0) return;
            const btn = document.createElement('button');
            btn.textContent = `Season ${season.season_number}`;
            btn.className = 'season-btn';
            btn.onclick = () => { currentSeason = season.season_number; loadEpisodes(currentSeason); };
            seasonsDiv.firstChild.appendChild(btn);
        });
        if (tvData.seasons.length) loadEpisodes(tvData.seasons[0].season_number);
    }
    async function loadEpisodes(seasonNum) {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${seasonNum}?api_key=${API_KEY}&language=en-US`);
        const seasonData = await res.json();
        const episodesDiv = document.getElementById('episodesList');
        episodesDiv.innerHTML = '';
        seasonData.episodes.forEach(ep => {
            const card = document.createElement('div');
            card.className = 'episode-card';
            card.innerHTML = `<span><strong>E${ep.episode_number}</strong> ${ep.name}</span><i class="fas fa-play-circle"></i>`;
            card.onclick = () => playEpisode(seasonNum, ep.episode_number);
            episodesDiv.appendChild(card);
        });
    }
    function playEpisode(season, episode) {
        const playerContainer = document.getElementById('playerContainer');
        const player = document.getElementById('player');
        player.src = `https://vidsrcme.ru/embed/tv/${id}/${season}/${episode}`;
        playerContainer.style.display = 'block';
        playerContainer.scrollIntoView({ behavior: 'smooth' });
    }
    loadTV();
</script>
</body>
</html>
