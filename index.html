<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - Stream Movies & TV Series</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
        }
        /* Header horizontal */
        .header {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e50914);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span { color: #e50914; background: none; -webkit-background-clip: unset; }
        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }
        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color: #e50914; }
        .genre-dropdown {
            position: relative;
            display: inline-block;
        }
        .genre-menu {
            position: absolute;
            top: 35px;
            left: 0;
            background: #1e1e2a;
            border-radius: 16px;
            padding: 10px 0;
            display: none;
            flex-direction: column;
            width: 140px;
            z-index: 200;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .genre-dropdown:hover .genre-menu { display: flex; }
        .genre-menu a {
            padding: 8px 20px;
            color: white;
            font-size: 14px;
        }
        .genre-menu a:hover { background: #e50914; }
        .search-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #searchInput {
            padding: 8px 18px;
            border-radius: 40px;
            border: none;
            background: #1e1e2a;
            color: white;
            width: 240px;
        }
        #userIcon {
            font-size: 28px;
            cursor: pointer;
        }
        /* Hero Slider */
        .hero-slider {
            margin: 30px 40px 40px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5);
        }
        .swiper {
            width: 100%;
            height: 480px;
        }
        .swiper-slide {
            position: relative;
        }
        .slide-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slide-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
        }
        .slide-content {
            position: absolute;
            bottom: 50px;
            left: 50px;
            max-width: 500px;
            z-index: 2;
        }
        .slide-content h2 {
            font-size: 42px;
            margin-bottom: 12px;
        }
        .slide-content p {
            font-size: 14px;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .btn-watch {
            background: #e50914;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-watch:hover {
            background: #b81d24;
            transform: scale(1.02);
        }
        /* Section titles */
        .section-title {
            font-size: 1.8rem;
            margin: 40px 40px 20px;
            font-weight: 600;
            border-left: 4px solid #e50914;
            padding-left: 15px;
        }
        /* Movie Grid - 8 columns */
        .movies-grid, .tv-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 18px;
            margin: 0 40px 30px;
        }
        @media (max-width: 1400px) { .movies-grid, .tv-grid { grid-template-columns: repeat(6,1fr); } }
        @media (max-width: 1000px) { .movies-grid, .tv-grid { grid-template-columns: repeat(4,1fr); } }
        @media (max-width: 700px) { .movies-grid, .tv-grid { grid-template-columns: repeat(2,1fr); margin: 0 20px; } }
        /* Cards */
        .movie-card, .tv-card {
            background: #141414;
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s;
            cursor: pointer;
            position: relative;
        }
        .movie-card:hover, .tv-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .card-icons {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 5px 8px;
            border-radius: 30px;
            z-index: 3;
        }
        .card-icons i {
            font-size: 13px;
            cursor: pointer;
            color: #ccc;
        }
        .card-icons i:hover { color: #e50914; }
        .card-info {
            padding: 10px;
        }
        .card-info h4 {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-info p {
            font-size: 12px;
            color: #aaa;
        }
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 10px 0 40px;
        }
        .page-btn {
            background: #1e1e2a;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .page-btn.active, .page-btn:hover {
            background: #e50914;
        }
        /* Preview hover (trailer) */
        .preview-rich {
            position: absolute;
            width: 340px;
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            z-index: 2000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }
        .preview-trailer iframe {
            width: 100%;
            height: 190px;
            border: none;
        }
        .preview-info {
            padding: 12px;
        }
        .preview-info h4 { font-size: 16px; margin-bottom: 6px; }
        .preview-meta { font-size: 12px; color: #ccc; margin-bottom: 8px; }
        .preview-overview { font-size: 12px; color: #bbb; }
        /* Modal & Toast (minimal) */
        .modal { display: none; position: fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:3000;align-items:center;justify-content:center; }
        .modal-content { background:#1e1e2a; max-width:400px; width:90%; border-radius:24px; padding:20px; }
        .close-modal { float:right; font-size:28px; cursor:pointer; }
        .auth-form { display:flex; flex-direction:column; gap:10px; margin-top:15px; }
        .auth-form input { padding:8px; border-radius:30px; border:none; background:#2a2a35; color:white; }
        .btn-primary { background:#e50914; border:none; padding:8px; border-radius:30px; color:white; cursor:pointer; }
        .toast { position:fixed; bottom:30px; right:30px; background:#e50914; padding:10px 20px; border-radius:40px; opacity:0; transition:0.3s; z-index:3500; }
        .toast.show { opacity:1; }
        @media (max-width: 768px) {
            .header { padding: 10px 20px; }
            .hero-slider { margin: 20px; }
            .slide-content h2 { font-size: 24px; }
            .slide-content { left: 20px; bottom: 30px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">AlbFilms<span>24</span></div>
    <div class="nav-links">
        <a href="#" class="active">Home</a>
        <a href="#">Movies</a>
        <a href="#">TV Series</a>
        <div class="genre-dropdown">
            <a href="#">Genres <i class="fas fa-chevron-down"></i></a>
            <div class="genre-menu">
                <a href="#" data-genre="28">Action</a>
                <a href="#" data-genre="35">Comedy</a>
                <a href="#" data-genre="18">Drama</a>
                <a href="#" data-genre="27">Horror</a>
                <a href="#" data-genre="878">Sci-Fi</a>
                <a href="#" data-genre="10749">Romance</a>
                <a href="#" data-genre="99">Documentary</a>
            </div>
        </div>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search movie, series...">
        <i id="userIcon" class="fas fa-user-circle"></i>
    </div>
</div>

<div class="hero-slider">
    <div class="swiper heroSwiper">
        <div class="swiper-wrapper" id="heroSlider"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-pagination"></div>
    </div>
</div>

<h2 class="section-title">🔥 Trending Movies</h2>
<div class="movies-grid" id="trendingGrid"></div>
<div class="pagination" id="moviePagination"></div>

<h2 class="section-title">📺 Popular TV Series</h2>
<div class="tv-grid" id="tvGrid"></div>
<div class="pagination" id="tvPagination"></div>

<div id="searchResultsContainer" style="display:none;">
    <h2 class="section-title">🔍 Search Results</h2>
    <div class="movies-grid" id="searchGrid"></div>
</div>

<!-- Modal Login Demo -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="auth-form">
            <input type="email" id="demoEmail" placeholder="Email">
            <input type="password" id="demoPass" placeholder="Password">
            <button class="btn-primary" id="demoLoginBtn">Sign In (Demo)</button>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';
    const BACKDROP_URL = 'https://image.tmdb.org/t/p/original';

    let currentPageMovies = 1, totalPagesMovies = 1;
    let currentPageTV = 1, totalPagesTV = 1;
    let swiper;
    let activePreview = null;

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Rich hover preview (with trailer)
    async function showRichPreview(movieId, cardEl, isTv = false) {
        if (activePreview) activePreview.remove();
        try {
            const type = isTv ? 'tv' : 'movie';
            const [detailsRes, videosRes] = await Promise.all([
                fetch(`${BASE_URL}/${type}/${movieId}?api_key=${API_KEY}&language=en-US`),
                !isTv ? fetch(`${BASE_URL}/movie/${movieId}/videos?api_key=${API_KEY}`) : Promise.resolve({ json: async () => ({ results: [] }) })
            ]);
            const details = await detailsRes.json();
            const videos = !isTv ? await videosRes.json() : { results: [] };
            const trailer = videos.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
            const title = details.title || details.name;
            const year = (details.release_date || details.first_air_date || '').split('-')[0] || 'N/A';
            const preview = document.createElement('div');
            preview.className = 'preview-rich';
            preview.innerHTML = `
                <div class="preview-trailer">
                    ${trailer ? `<iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>` : '<div style="height:190px; background:#111; display:flex; align-items:center; justify-content:center;">No trailer available</div>'}
                </div>
                <div class="preview-info">
                    <h4>${title} (${year})</h4>
                    <div class="preview-meta">⭐ ${details.vote_average?.toFixed(1)}/10</div>
                    <div class="preview-overview">${details.overview?.substring(0, 130)}...</div>
                </div>
            `;
            document.body.appendChild(preview);
            activePreview = preview;
            const rect = cardEl.getBoundingClientRect();
            preview.style.top = rect.top + window.scrollY + 'px';
            preview.style.left = rect.left + rect.width + 15 + 'px';
            if (parseInt(preview.style.left) + 360 > window.innerWidth) {
                preview.style.left = rect.left - 370 + 'px';
            }
        } catch(e) { console.error(e); }
    }

    function createCard(item, isTv, containerId) {
        const card = document.createElement('div');
        card.className = isTv ? 'tv-card' : 'movie-card';
        const title = item.title || item.name;
        const year = (item.release_date || item.first_air_date || '').split('-')[0] || 'N/A';
        const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
        card.innerHTML = `
            <div class="card-icons">
                <i class="far fa-heart"></i>
                <i class="far fa-clock"></i>
            </div>
            <img class="poster" src="${item.poster_path ? IMG_URL+item.poster_path : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${title}">
            <div class="card-info">
                <h4>${title}</h4>
                <p>${year} ⭐ ${rating}</p>
            </div>
        `;
        let hoverTimeout;
        card.addEventListener('mouseenter', () => {
            hoverTimeout = setTimeout(() => showRichPreview(item.id, card, isTv), 400);
        });
        card.addEventListener('mouseleave', () => {
            clearTimeout(hoverTimeout);
            if (activePreview) activePreview.remove();
        });
        card.addEventListener('click', () => {
            if (isTv) window.location.href = `watch.html?id=${item.id}&type=tv`;
            else window.location.href = `watch.html?id=${item.id}&type=movie`;
        });
        document.getElementById(containerId).appendChild(card);
    }

    async function loadMovies(page = 1) {
        const grid = document.getElementById('trendingGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">Loading...</div>';
        const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=en-US&page=${page}`);
        const data = await res.json();
        totalPagesMovies = Math.min(data.total_pages, 10);
        grid.innerHTML = '';
        data.results.forEach(m => createCard(m, false, 'trendingGrid'));
        const pag = document.getElementById('moviePagination');
        pag.innerHTML = '';
        for (let i = 1; i <= totalPagesMovies; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.className = `page-btn ${i === page ? 'active' : ''}`;
            btn.onclick = () => { loadMovies(i); currentPageMovies = i; };
            pag.appendChild(btn);
        }
    }

    async function loadTVShows(page = 1) {
        const grid = document.getElementById('tvGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">Loading...</div>';
        const res = await fetch(`${BASE_URL}/trending/tv/week?api_key=${API_KEY}&language=en-US&page=${page}`);
        const data = await res.json();
        totalPagesTV = Math.min(data.total_pages, 10);
        grid.innerHTML = '';
        data.results.forEach(s => createCard(s, true, 'tvGrid'));
        const pag = document.getElementById('tvPagination');
        pag.innerHTML = '';
        for (let i = 1; i <= totalPagesTV; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.className = `page-btn ${i === page ? 'active' : ''}`;
            btn.onclick = () => { loadTVShows(i); currentPageTV = i; };
            pag.appendChild(btn);
        }
    }

    async function loadHeroSlider() {
        const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=en-US`);
        const data = await res.json();
        const slides = data.results.slice(0, 5);
        const wrapper = document.getElementById('heroSlider');
        wrapper.innerHTML = '';
        slides.forEach(m => {
            const div = document.createElement('div');
            div.className = 'swiper-slide';
            div.innerHTML = `
                <img class="slide-bg" src="${BACKDROP_URL + m.backdrop_path}" alt="${m.title}">
                <div class="slide-overlay"></div>
                <div class="slide-content">
                    <h2>${m.title}</h2>
                    <p>${m.overview?.substring(0, 120)}...</p>
                    <button class="btn-watch" onclick="location.href='watch.html?id=${m.id}&type=movie'">Watch Now</button>
                </div>
            `;
            wrapper.appendChild(div);
        });
        if (swiper) swiper.destroy();
        swiper = new Swiper('.heroSwiper', {
            loop: true,
            autoplay: { delay: 5500 },
            navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
            pagination: { el: '.swiper-pagination', clickable: true }
        });
    }

    async function searchContent(query) {
        if (!query || query.length < 2) {
            document.getElementById('searchResultsContainer').style.display = 'none';
            return;
        }
        const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=en-US`);
        const data = await res.json();
        const results = data.results.filter(r => r.media_type === 'movie' || r.media_type === 'tv').slice(0, 24);
        const grid = document.getElementById('searchGrid');
        grid.innerHTML = '';
        results.forEach(item => createCard(item, item.media_type === 'tv', 'searchGrid'));
        document.getElementById('searchResultsContainer').style.display = results.length ? 'block' : 'none';
    }

    async function loadGenre(genreId) {
        const grid = document.getElementById('trendingGrid');
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;">Loading...</div>';
        const res = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc&language=en-US`);
        const data = await res.json();
        grid.innerHTML = '';
        data.results.slice(0, 24).forEach(m => createCard(m, false, 'trendingGrid'));
        document.getElementById('moviePagination').innerHTML = '';
        showToast('Genre filtered');
    }

    document.getElementById('searchInput').addEventListener('input', e => searchContent(e.target.value));
    document.getElementById('userIcon').onclick = () => document.getElementById('authModal').style.display = 'flex';
    document.querySelector('.close-modal').onclick = () => document.getElementById('authModal').style.display = 'none';
    document.getElementById('demoLoginBtn').onclick = () => { showToast('Demo login (no backend)'); document.getElementById('authModal').style.display = 'none'; };
    document.querySelectorAll('.genre-menu a').forEach(a => {
        a.addEventListener('click', e => {
            e.preventDefault();
            loadGenre(a.dataset.genre);
        });
    });

    loadHeroSlider();
    loadMovies(1);
    loadTVShows(1);
</script>
</body>
</html>
