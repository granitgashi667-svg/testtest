<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - Neon Blade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #0ff; font-family: 'Courier New', monospace; }
        .sidebar {
            position: fixed; left: 0; top: 0; width: 80px; height: 100vh;
            background: #111; border-right: 2px solid #0ff; box-shadow: 0 0 10px #0ff;
            display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 30px;
        }
        .sidebar i { font-size: 26px; color: #0ff; cursor: pointer; text-shadow: 0 0 5px #0ff; }
        .sidebar i:hover { color: #f0f; text-shadow: 0 0 8px #f0f; }
        .main { margin-left: 90px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .logo { font-size: 32px; font-weight: bold; text-shadow: 0 0 5px #f0f; }
        .logo span { color: #f0f; }
        #searchInput { background: #111; border: 1px solid #0ff; color: #0ff; padding: 8px 15px; border-radius: 30px; width: 250px; }
        #userIcon { font-size: 30px; color: #0ff; cursor: pointer; }
        .hero-slider { margin-bottom: 40px; border-radius: 16px; overflow: hidden; border: 2px solid #0ff; box-shadow: 0 0 15px #0ff; }
        .swiper { width: 100%; height: 450px; }
        .slide-content { position: absolute; bottom: 40px; left: 40px; background: rgba(0,0,0,0.7); padding: 15px; border-left: 4px solid #f0f; }
        .slide-content h2 { color: #f0f; }
        .btn-watch { background: #0ff; color: #000; border: none; padding: 8px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .section-title { font-size: 28px; margin: 30px 0 20px; border-left: 5px solid #f0f; padding-left: 15px; text-shadow: 0 0 3px #f0f; }
        .movies-grid, .tv-grid { display: grid; grid-template-columns: repeat(8,1fr); gap: 18px; margin-bottom: 30px; }
        @media (max-width:1400px){ .movies-grid, .tv-grid { grid-template-columns: repeat(6,1fr); } }
        @media (max-width:1000px){ .movies-grid, .tv-grid { grid-template-columns: repeat(4,1fr); } }
        .movie-card, .tv-card { background: #111; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .movie-card:hover, .tv-card:hover { border-color: #f0f; box-shadow: 0 0 15px #f0f; transform: scale(1.02); }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 8px; }
        .card-info h4 { font-size: 14px; color: #0ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .page-btn { background: #111; border: 1px solid #0ff; color: #0ff; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .page-btn.active, .page-btn:hover { background: #0ff; color: #000; }
        .preview-rich { position: absolute; width: 320px; background: #000; border: 2px solid #f0f; border-radius: 12px; z-index: 2000; box-shadow: 0 0 20px #f0f; }
        .modal { display: none; position: fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:3000;align-items:center;justify-content:center; }
        .modal-content { background:#111; border:2px solid #0ff; border-radius:20px; padding:20px; max-width:400px; }
        .toast { position:fixed; bottom:30px; right:30px; background:#0ff; color:#000; padding:8px 16px; border-radius:20px; opacity:0; transition:0.3s; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>
<div class="sidebar">
    <i class="fas fa-home"></i>
    <i class="fas fa-film"></i>
    <i class="fas fa-tv"></i>
    <i class="fas fa-th-large"></i>
</div>
<div class="main">
    <div class="header">
        <div class="logo">AlbFilms<span>24</span></div>
        <div><input id="searchInput" placeholder="Search neon..."><i id="userIcon" class="fas fa-user-circle" style="margin-left:10px;"></i></div>
    </div>
    <div class="hero-slider"><div class="swiper heroSwiper"><div class="swiper-wrapper" id="heroSlider"></div><div class="swiper-button-next"></div><div class="swiper-button-prev"></div><div class="swiper-pagination"></div></div></div>
    <h2 class="section-title">🔥 Trending Movies</h2><div class="movies-grid" id="trendingGrid"></div><div class="pagination" id="moviePagination"></div>
    <h2 class="section-title">📺 Trending TV</h2><div class="tv-grid" id="tvGrid"></div><div class="pagination" id="tvPagination"></div>
    <div id="searchResultsContainer" style="display:none;"><h2 class="section-title">🔍 Search Results</h2><div class="movies-grid" id="searchGrid"></div></div>
</div>
<div id="authModal" class="modal"><div class="modal-content"><span class="close-modal" style="float:right;cursor:pointer;">&times;</span><div class="auth-form"><input type="email" id="demoEmail" placeholder="Email"><input type="password" id="demoPass" placeholder="Password"><button class="btn-primary" id="demoLoginBtn" style="background:#0ff;color:#000;">Login</button></div></div></div>
<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
const API_KEY='7a98db423d6e3a5ee922a3e51a09d135',BASE='https://api.themoviedb.org/3',IMG='https://image.tmdb.org/t/p/w500',BACK='https://image.tmdb.org/t/p/original';
let swiper,activePreview;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
async function showRichPreview(id,el,isTv){if(activePreview)activePreview.remove();try{const type=isTv?'tv':'movie';const[d,v]=await Promise.all([fetch(`${BASE}/${type}/${id}?api_key=${API_KEY}`),!isTv?fetch(`${BASE}/movie/${id}/videos?api_key=${API_KEY}`):{json:()=>({results:[]})}]);const dt=await d.json(),vd=await v.json();const trailer=vd.results?.find(t=>t.type==='Trailer'&&t.site==='YouTube');const pre=document.createElement('div');pre.className='preview-rich';pre.innerHTML=`<div class="preview-trailer">${trailer?`<iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1" frameborder="0" allow="autoplay"></iframe>`:'<div style="height:150px;background:#000;text-align:center;padding-top:60px;">No trailer</div>'}</div><div class="preview-info"><h4>${dt.title||dt.name}</h4><p>${dt.overview?.substring(0,100)}...</p></div>`;document.body.appendChild(pre);activePreview=pre;const r=el.getBoundingClientRect();pre.style.top=r.top+window.scrollY+'px';pre.style.left=r.left+r.width+10+'px';if(parseInt(pre.style.left)+320>innerWidth)pre.style.left=r.left-330+'px';}catch(e){}}
function createCard(item,isTv,cont){const c=document.createElement('div');c.className=isTv?'tv-card':'movie-card';const title=item.title||item.name,year=(item.release_date||item.first_air_date||'').split('-')[0]||'N/A';c.innerHTML=`<img class="poster" src="${item.poster_path?IMG+item.poster_path:'https://via.placeholder.com/300x450'}" alt="${title}"><div class="card-info"><h4>${title}</h4><p>${year}</p></div>`;let t;c.onmouseenter=()=>{t=setTimeout(()=>showRichPreview(item.id,c,isTv),400);};c.onmouseleave=()=>{clearTimeout(t);if(activePreview)activePreview.remove();};c.onclick=()=>window.location.href=`watch.html?id=${item.id}&type=${isTv?'tv':'movie'}`;document.getElementById(cont).appendChild(c);}
async function loadMovies(p=1){const g=document.getElementById('trendingGrid');g.innerHTML='Loading...';const r=await fetch(`${BASE}/trending/movie/week?api_key=${API_KEY}&page=${p}`);const d=await r.json();g.innerHTML='';d.results.slice(0,24).forEach(m=>createCard(m,0,'trendingGrid'));const pg=document.getElementById('moviePagination');pg.innerHTML='';for(let i=1;i<=Math.min(d.total_pages,8);i++){const b=document.createElement('button');b.textContent=i;b.className='page-btn'+(i===p?' active':'');b.onclick=()=>loadMovies(i);pg.appendChild(b);}}
async function loadTV(p=1){const g=document.getElementById('tvGrid');g.innerHTML='Loading...';const r=await fetch(`${BASE}/trending/tv/week?api_key=${API_KEY}&page=${p}`);const d=await r.json();g.innerHTML='';d.results.slice(0,24).forEach(s=>createCard(s,1,'tvGrid'));const pg=document.getElementById('tvPagination');pg.innerHTML='';for(let i=1;i<=Math.min(d.total_pages,8);i++){const b=document.createElement('button');b.textContent=i;b.className='page-btn'+(i===p?' active':'');b.onclick=()=>loadTV(i);pg.appendChild(b);}}
async function loadHero(){const r=await fetch(`${BASE}/trending/movie/week?api_key=${API_KEY}`);const d=await r.json();const slides=d.results.slice(0,5);const w=document.getElementById('heroSlider');w.innerHTML='';slides.forEach(m=>{const div=document.createElement('div');div.className='swiper-slide';div.innerHTML=`<img class="slide-bg" src="${BACK+m.backdrop_path}"><div class="slide-content"><h2>${m.title}</h2><p>${m.overview?.substring(0,100)}...</p><button class="btn-watch" onclick="location.href='watch.html?id=${m.id}&type=movie'">Watch</button></div>`;w.appendChild(div);});if(swiper)swiper.destroy();swiper=new Swiper('.heroSwiper',{loop:true,autoplay:{delay:5000},navigation:{nextEl:'.swiper-button-next',prevEl:'.swiper-button-prev'},pagination:{el:'.swiper-pagination',clickable:true}});}
async function search(q){if(!q||q.length<2){document.getElementById('searchResultsContainer').style.display='none';return;}const r=await fetch(`${BASE}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}`);const d=await r.json();const res=d.results.filter(r=>r.media_type==='movie'||r.media_type==='tv').slice(0,24);const g=document.getElementById('searchGrid');g.innerHTML='';res.forEach(i=>createCard(i,i.media_type==='tv','searchGrid'));document.getElementById('searchResultsContainer').style.display=res.length?'block':'none';}
document.getElementById('searchInput').addEventListener('input',e=>search(e.target.value));
document.getElementById('userIcon').onclick=()=>document.getElementById('authModal').style.display='flex';
document.querySelector('.close-modal').onclick=()=>document.getElementById('authModal').style.display='none';
document.getElementById('demoLoginBtn').onclick=()=>{showToast('Demo login');document.getElementById('authModal').style.display='none';};
loadHero();loadMovies(1);loadTV(1);
</script>
</body>
</html>
