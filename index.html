<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - Minimal Dark</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* ========== VARIANT 1: Minimalist & Dark ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }
        /* Sidebar - no AF logo, functional icons with dropdown */
        .sidebar {
            position: fixed; left: 0; top: 0; width: 70px; height: 100vh;
            background: #111; display: flex; flex-direction: column; align-items: center;
            padding-top: 20px; gap: 25px; z-index: 100;
        }
        .sidebar i { font-size: 24px; color: #aaa; cursor: pointer; transition: 0.2s; }
        .sidebar i:hover { color: #e50914; }
        /* Genre dropdown on click (simple alert for demo, can be expanded) */
        .sidebar .genre-dropdown { position: relative; }
        .sidebar .genre-menu {
            position: absolute; left: 70px; top: 0; background: #1e1e2a;
            border-radius: 12px; padding: 10px; display: none; flex-direction: column;
            white-space: nowrap; z-index: 200;
        }
        .sidebar .genre-dropdown:hover .genre-menu { display: flex; }
        .sidebar .genre-menu a { color: white; padding: 5px 10px; text-decoration: none; font-size: 12px; }
        .sidebar .genre-menu a:hover { background: #e50914; border-radius: 6px; }

        .main { margin-left: 70px; padding: 20px 30px; }
        /* Header no brand text, just search bar */
        .header { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        #searchInput { padding: 10px 20px; border-radius: 40px; border: none; background: #1e1e2a; color: white; width: 280px; }
        #userIcon { font-size: 28px; margin-left: 15px; cursor: pointer; }

        /* Hero Slider - only movie images, no text overlay */
        .hero-slider { margin-bottom: 40px; border-radius: 16px; overflow: hidden; }
        .swiper { width: 100%; height: 450px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Section title */
        .section-title { font-size: 1.8rem; margin: 30px 0 20px; font-weight: 600; border-left: 4px solid #e50914; padding-left: 15px; }

        /* Grid with 8 items per row on large screens */
        .movies-grid, .tv-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        /* Responsive: fallback to fewer columns on smaller screens */
        @media (max-width: 1400px) { .movies-grid, .tv-grid { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 1000px) { .movies-grid, .tv-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px) { .movies-grid, .tv-grid { grid-template-columns: repeat(2, 1fr); } }

        /* Card styling */
        .movie-card, .tv-card {
            background: #141414; border-radius: 12px; overflow: hidden;
            transition: transform 0.2s; cursor: pointer; position: relative;
        }
        .movie-card:hover, .tv-card:hover { transform: scale(1.02); }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-icons { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 4px 6px; border-radius: 20px; }
        .card-icons i { font-size: 12px; cursor: pointer; }
        .card-info { padding: 8px; }
        .card-info h4 { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info p { font-size: 11px; color: #aaa; }

        /* Pagination */
        .pagination {
            display: flex; justify-content: center; gap: 12px; margin: 20px 0 40px;
        }
        .page-btn {
            background: #1e1e2a; border: none; padding: 8px 14px; border-radius: 30px;
            color: white; cursor: pointer; transition: 0.2s;
        }
        .page-btn.active { background: #e50914; }
        .page-btn:hover { background: #333; }

        /* Modal, panel, toast same as before (keep functionality) */
        .modal { display: none; position: fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:3000;align-items:center;justify-content:center; }
        .modal-content { background:#1e1e2a; max-width:400px; width:90%; border-radius:24px; padding:20px; }
        .close-modal { float:right; font-size:28px; cursor:pointer; }
        .auth-tabs { display:flex; gap:15px; margin:15px 0; }
        .tab-btn { background:none; border:none; color:#ccc; padding:5px; cursor:pointer; }
        .tab-btn.active { color:#e50914; border-bottom:2px solid #e50914; }
        .auth-form { display:none; flex-direction:column; gap:12px; }
        .auth-form.active { display:flex; }
        .auth-form input { padding:10px; border-radius:30px; border:none; background:#2a2a35; color:white; }
        .btn-google { background:white; color:black; padding:10px; border-radius:30px; cursor:pointer; }
        .user-panel { position:fixed; top:80px; right:20px; width:300px; background:#141414; border-radius:16px; padding:15px; z-index:1500; border:1px solid #333; display:none; }
        .panel-points { background:#222; padding:10px; border-radius:12px; margin-bottom:10px; }
        .btn-small { background:#e50914; border:none; color:white; padding:4px 12px; border-radius:20px; cursor:pointer; }
        .toast { position:fixed; bottom:30px; right:30px; background:#e50914; padding:12px 20px; border-radius:40px; z-index:3500; opacity:0; transition:0.3s; }
        .toast.show { opacity:1; }
        .preview-rich { /* same as original, omitted for brevity but include */ }
    </style>
</head>
