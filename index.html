<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AlbFilms24 - 2000+ Movies & 500+ Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; }
        
        /* ========== LOGO E RE KINEMATOGRAFIKE ========== */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            position: relative;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #000000, #2a0000);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(229,9,20,0.3);
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        .logo-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 80%);
            transform: rotate(25deg);
            animation: glossMove 6s infinite;
        }
        @keyframes glossMove {
            0% { transform: translate(-30%, -30%) rotate(25deg); opacity: 0; }
            50% { transform: translate(0%, 0%) rotate(25deg); opacity: 0.6; }
            100% { transform: translate(30%, 30%) rotate(25deg); opacity: 0; }
        }
        .film-reel {
            width: 40px;
            height: 40px;
            background: repeating-radial-gradient(circle at 50% 50%, #e50914 0px, #e50914 4px, #000 4px, #000 8px);
            border-radius: 50%;
            position: relative;
            animation: spinSlow 8s linear infinite;
        }
        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .reel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #000;
            border-radius: 50%;
            border: 1px solid #e50914;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }
        .logo-text .top {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, #e50914);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-text .bottom {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .bottom .albfilms {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 600;
            background: linear-gradient(135deg, #e50914, #ff6600);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 26px;
        }
        .bottom .num24 {
            font-family: 'Montserrat', sans-serif;
            font-size: 42px;
            font-weight: 800;
            color: #FFD700;
            text-shadow: 0 0 5px #e50914;
            animation: pulseNeon 1.5s ease-in-out infinite;
            position: relative;
        }
        @keyframes pulseNeon {
            0%, 100% { text-shadow: 0 0 2px #e50914, 0 0 5px #e50914; }
            50% { text-shadow: 0 0 8px #e50914, 0 0 12px #e50914; }
        }
        .clapper {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: #e50914;
            margin-left: 5px;
            clip-path: polygon(0% 0%, 100% 0%, 100% 80%, 60% 100%, 0% 80%);
            vertical-align: middle;
            animation: clap 1s infinite;
        }
        @keyframes clap {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.9); opacity: 0.7; }
        }
        
        /* Sidebar me tekst */
        .sidebar {
            position: fixed; left: 0; top: 0; width: 120px; height: 100vh;
            background: rgba(10,10,15,0.96); backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            justify-content: space-between; padding: 30px 0 30px 0;
            z-index: 100; border-right: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-top, .sidebar-bottom {
            display: flex; flex-direction: column; align-items: center; gap: 25px;
        }
        .sidebar a {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #aaa; gap: 5px;
            transition: 0.2s; font-size: 12px; font-weight: 500;
        }
        .sidebar a i { font-size: 22px; }
        .sidebar a:hover, .sidebar a.active { color: #e50914; transform: translateY(-3px); }
        
        .main { margin-left: 120px; padding: 20px 40px; max-width: calc(100% - 120px); }
        
        /* Hero Slider */
        .hero-slider { position: relative; margin-bottom: 40px; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5); }
        .swiper { width: 100%; height: 600px; }
        .swiper-slide { position: relative; }
        .slide-bg { width: 100%; height: 100%; object-fit: cover; }
        .slide-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 100%); }
        .slide-description-card {
            position: absolute; left: 60px; bottom: 60px; max-width: 500px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px);
            padding: 24px 28px; border-radius: 24px; border-left: 5px solid #e50914;
            z-index: 15; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
        }
        .slide-description-card h2 { font-size: 36px; font-family: 'Playfair Display', serif; font-weight: 700; margin-bottom: 12px; }
        .slide-meta { display: flex; gap: 16px; margin-bottom: 12px; font-size: 14px; color: #ddd; }
        .rating { color: #f5c518; font-weight: 600; }
        .slide-description-card p { font-size: 14px; line-height: 1.5; margin-bottom: 16px; color: #ccc; }
        .slide-cast { font-size: 13px; color: #aaa; margin-bottom: 20px; }
        .btn-watch { background: #e50914; border: none; padding: 12px 32px; border-radius: 50px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.25s; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 4px 12px rgba(229,9,20,0.3); }
        .btn-watch:hover { background: #b81d24; transform: scale(1.02); }
        
        .slider-static-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 20; width: 90%; max-width: 700px; pointer-events: none;
        }
        .slider-search { pointer-events: auto; }
        .slider-search input {
            width: 80%; max-width: 500px; padding: 14px 24px;
            border-radius: 60px; border: none; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); color: white; font-size: 16px; outline: none;
            text-align: center; border: 1px solid rgba(255,255,255,0.3);
        }
        .slider-search input:focus { background: rgba(0,0,0,0.8); border-color: #e50914; }
        
        .section-header { display: flex; justify-content: space-between; align-items: baseline; margin: 40px 0 20px; flex-wrap: wrap; }
        .section-title { font-size: 24px; font-weight: 700; border-left: 4px solid #e50914; padding-left: 15px; }
        .pagination-controls { display: flex; gap: 8px; }
        .page-btn { background: #1e2026; border: none; padding: 6px 14px; border-radius: 30px; color: #ccc; cursor: pointer; }
        .page-btn.active, .page-btn:hover { background: #e50914; color: white; }
        .movies-grid, .tv-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 20px; margin-bottom: 30px; }
        @media (max-width:1400px){ .movies-grid, .tv-grid { grid-template-columns: repeat(6,1fr); } }
        @media (max-width:1100px){ .movies-grid, .tv-grid { grid-template-columns: repeat(4,1fr); } }
        .movie-card, .tv-card { background: #181a24; border-radius: 14px; overflow: hidden; transition: transform 0.25s; cursor: pointer; }
        .movie-card:hover, .tv-card:hover { transform: translateY(-6px); box-shadow: 0 12px 20px rgba(0,0,0,0.4); }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 12px; }
        .card-info h4 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info p { font-size: 12px; color: #aaa; }
        
        .preview-rich { position: absolute; width: 340px; background: #1a1c22; border-radius: 16px; overflow: hidden; z-index: 2000; border: 1px solid #e50914; }
        .preview-trailer iframe { width: 100%; height: 190px; border: none; }
        .preview-info { padding: 12px; }
        
        .footer { margin-top: 60px; background: #0c0e12; border-radius: 30px 30px 0 0; padding: 40px 30px 20px; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 40px; }
        .footer-logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg,#fff,#e50914); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .social-links a { margin-right: 15px; color: #ccc; text-decoration: none; }
        .disclaimer { font-size: 12px; color: #888; background: #1a1c22; padding: 12px; border-radius: 12px; margin-top: 15px; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #e50914; padding: 10px 20px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 3500; }
        .toast.show { opacity: 1; }
        .modal { display: none; position: fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:3000;align-items:center;justify-content:center; }
        .modal-content { background:#1e2026; max-width:400px; width:90%; border-radius:24px; padding:24px; }
        .close-modal { float:right; font-size:28px; cursor:pointer; }
        .auth-form { display:flex; flex-direction:column; gap:12px; margin-top:20px; }
        .auth-form input { padding:10px; border-radius:30px; border:none; background:#2a2c30; color:white; }
        .btn-primary { background:#e50914; border:none; padding:10px; border-radius:30px; color:white; cursor:pointer; }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    (function() {
        const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
        const BASE = 'https://api.themoviedb.org/3';
        const IMG = 'https://image.tmdb.org/t/p/w500';
        const BACKDROP = 'https://image.tmdb.org/t/p/original';
        let swiper = null;
        let activePreview = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function showRichPreview(id, el, isTv) {
            if (activePreview) activePreview.remove();
            try {
                const type = isTv ? 'tv' : 'movie';
                const [details, videos] = await Promise.all([
                    fetch(`${BASE}/${type}/${id}?api_key=${API_KEY}&language=en-US`).then(r=>r.json()),
                    !isTv ? fetch(`${BASE}/movie/${id}/videos?api_key=${API_KEY}`).then(r=>r.json()) : { results: [] }
                ]);
                const trailer = videos.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                const title = details.title || details.name;
                const year = (details.release_date || details.first_air_date || '').split('-')[0] || 'N/A';
                const preview = document.createElement('div');
                preview.className = 'preview-rich';
                preview.innerHTML = `
                    <div class="preview-trailer">
                        ${trailer ? `<iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1" frameborder="0" allow="autoplay"></iframe>` : '<div style="height:190px;background:#111;display:flex;align-items:center;justify-content:center;">🎬 No trailer</div>'}
                    </div>
                    <div class="preview-info"><h4>${title} (${year})</h4><p>${details.overview?.substring(0,100)}...</p></div>
                `;
                document.body.appendChild(preview);
                activePreview = preview;
                const rect = el.getBoundingClientRect();
                preview.style.top = rect.top + window.scrollY + 'px';
                preview.style.left = rect.left + rect.width + 15 + 'px';
                if (parseInt(preview.style.left) + 360 > window.innerWidth) preview.style.left = rect.left - 370 + 'px';
            } catch(e) { console.error(e); }
        }

        function createCard(item, isTv, containerId, isFeatured = false) {
            const card = document.createElement('div');
            card.className = isTv ? 'tv-card' : 'movie-card';
            const title = item.title || item.name;
            const year = (item.release_date || item.first_air_date || '').split('-')[0] || 'N/A';
            const rating = item.vote_average ? item.vote_average.toFixed(1) : '?';
            card.innerHTML = `
                <img class="poster" src="${item.poster_path ? IMG+item.poster_path : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${title}">
                <div class="card-info"><h4>${title}</h4><p>${year} ⭐ ${rating}</p></div>
            `;
            let timeout;
            card.onmouseenter = () => { timeout = setTimeout(() => showRichPreview(item.id, card, isTv), 400); };
            card.onmouseleave = () => { clearTimeout(timeout); if(activePreview) activePreview.remove(); };
            card.onclick = () => {
                if (isTv) window.location.href = `tv.html?id=${item.id}`;
                else window.location.href = `watch.html?id=${item.id}&type=movie`;
            };
            document.getElementById(containerId).appendChild(card);
        }

        // Load movies per genre with 8 pages
        async function loadGenreMovies(genreId, gridId, pagId, page = 1) {
            const grid = document.getElementById(gridId);
            if (!grid) return;
            if (page === 1) grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;">Loading movies...</div>';
            try {
                const res = await fetch(`${BASE}/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc&vote_count.gte=100&language=en-US&page=${page}`);
                const data = await res.json();
                const totalPages = Math.min(data.total_pages, 8);
                if (page === 1) grid.innerHTML = '';
                data.results.forEach(m => createCard(m, false, gridId));
                const pagContainer = document.getElementById(pagId);
                if (pagContainer && page === 1) {
                    pagContainer.innerHTML = '';
                    for (let i = 1; i <= totalPages; i++) {
                        const btn = document.createElement('button');
                        btn.textContent = i;
                        btn.className = `page-btn ${i === page ? 'active' : ''}`;
                        btn.onclick = () => { grid.innerHTML = ''; loadGenreMovies(genreId, gridId, pagId, i); };
                        pagContainer.appendChild(btn);
                    }
                }
            } catch(e) { console.error(e); grid.innerHTML = '<div>Error</div>'; }
        }

        // Featured TV (një rresht i vogël)
        async function loadFeaturedTV() {
            const grid = document.getElementById('featuredTvGrid');
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;">Loading featured series...</div>';
            const res = await fetch(`${BASE}/tv/top_rated?api_key=${API_KEY}&language=en-US&page=1`);
            const data = await res.json();
            grid.innerHTML = '';
            data.results.slice(0, 8).forEach(show => createCard(show, true, 'featuredTvGrid'));
        }

        async function loadHeroSlider() {
            const res = await fetch(`${BASE}/movie/popular?api_key=${API_KEY}&language=en-US`);
            const data = await res.json();
            const slides = data.results.slice(0, 6);
            const wrapper = document.getElementById('heroSlider');
            wrapper.innerHTML = '';
            for (const m of slides) {
                const [det, credit] = await Promise.all([
                    fetch(`${BASE}/movie/${m.id}?api_key=${API_KEY}&language=en-US`).then(r=>r.json()),
                    fetch(`${BASE}/movie/${m.id}/credits?api_key=${API_KEY}&language=en-US`).then(r=>r.json())
                ]);
                const rating = det.vote_average ? det.vote_average.toFixed(1) : 'N/A';
                const castList = credit.cast ? credit.cast.slice(0,3).map(c=>c.name).join(', ') : 'N/A';
                const overview = det.overview ? det.overview.substring(0,150) : 'No description';
                const div = document.createElement('div');
                div.className = 'swiper-slide';
                div.innerHTML = `
                    <img class="slide-bg" src="${BACKDROP + m.backdrop_path}">
                    <div class="slide-overlay"></div>
                    <div class="slide-description-card">
                        <h2>${m.title}</h2>
                        <div class="slide-meta"><span class="rating"><i class="fas fa-star"></i> ${rating}/10</span><span><i class="fas fa-calendar-alt"></i> ${det.release_date?.split('-')[0] || 'N/A'}</span><span><i class="fas fa-clock"></i> ${det.runtime || '?'} min</span></div>
                        <p>${overview}...</p>
                        <div class="slide-cast"><i class="fas fa-users"></i> <strong>Cast:</strong> ${castList}</div>
                        <button class="btn-watch" onclick="location.href='watch.html?id=${m.id}&type=movie'"><i class="fas fa-play"></i> Watch Now</button>
                    </div>
                `;
                wrapper.appendChild(div);
            }
            if (swiper) swiper.destroy();
            swiper = new Swiper('.heroSwiper', { loop: true, autoplay: { delay: 6000 }, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }, pagination: { el: '.swiper-pagination', clickable: true } });
        }

        async function searchContent(query) {
            if (!query || query.length < 3) {
                document.getElementById('searchResultsContainer').style.display = 'none';
                return;
            }
            const res = await fetch(`${BASE}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=en-US`);
            const data = await res.json();
            const results = data.results.filter(r => r.media_type === 'movie' || r.media_type === 'tv').slice(0, 24);
            const grid = document.getElementById('searchGrid');
            grid.innerHTML = '';
            results.forEach(item => createCard(item, item.media_type === 'tv', 'searchGrid'));
            document.getElementById('searchResultsContainer').style.display = results.length ? 'block' : 'none';
        }

        function initGenres() {
            const genres = [
                { id:28, grid:'actionGrid', pag:'actionPagination' }, { id:35, grid:'comedyGrid', pag:'comedyPagination' },
                { id:18, grid:'dramaGrid', pag:'dramaPagination' }, { id:27, grid:'horrorGrid', pag:'horrorPagination' },
                { id:10749, grid:'romanceGrid', pag:'romancePagination' }, { id:878, grid:'scifiGrid', pag:'scifiPagination' },
                { id:99, grid:'docGrid', pag:'docPagination' }, { id:80, grid:'crimeGrid', pag:'crimePagination' },
                { id:12, grid:'adventureGrid', pag:'adventurePagination' }, { id:14, grid:'fantasyGrid', pag:'fantasyPagination' },
                { id:10752, grid:'warGrid', pag:'warPagination' }, { id:37, grid:'westernGrid', pag:'westernPagination' },
                { id:10402, grid:'musicGrid', pag:'musicPagination' }, { id:36, grid:'historyGrid', pag:'historyPagination' }
            ];
            genres.forEach(g => loadGenreMovies(g.id, g.grid, g.pag, 1));
        }

        document.getElementById('searchInputSlider').addEventListener('input', e => searchContent(e.target.value));
        document.getElementById('userIconSidebar').onclick = () => document.getElementById('authModal').style.display = 'flex';
        document.querySelector('.close-modal').onclick = () => document.getElementById('authModal').style.display = 'none';
        document.getElementById('demoLoginBtn').onclick = () => { showToast('Demo login'); document.getElementById('authModal').style.display = 'none'; };
        document.getElementById('homeLink').onclick = (e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        document.getElementById('moviesLink').onclick = (e) => { e.preventDefault(); document.getElementById('actionGrid').scrollIntoView({ behavior: 'smooth' }); };
        document.getElementById('favoritesLink').onclick = (e) => { e.preventDefault(); showToast('Login to see favorites'); };

        loadHeroSlider();
        initGenres();
        loadFeaturedTV();
    })();
</script>
</body>
</html>
