<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AlbFilms24 - 2000+ Movies & 500+ Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* Të gjitha stilet responsive – njësoj për PC dhe celular */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; }
        .sidebar { position: fixed; left: 0; top: 0; width: 80px; height: 100vh; background: rgba(10,10,15,0.96); backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 30px 0; z-index: 100; border-right: 1px solid rgba(255,255,255,0.08); }
        .sidebar-top, .sidebar-bottom { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .sidebar a { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #aaa; gap: 5px; transition: 0.2s; font-size: 11px; font-weight: 500; }
        .sidebar a i { font-size: 24px; }
        .sidebar a span { font-size: 11px; }
        .sidebar a:hover, .sidebar a.active { color: #e50914; transform: translateY(-3px); }
        .main { margin-left: 80px; padding: 20px 40px; max-width: calc(100% - 80px); }
        .hero-slider { position: relative; margin-bottom: 40px; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 40px -12px rgba(0,0,0,0.6); }
        .swiper { width: 100%; height: 600px; }
        .swiper-slide { position: relative; }
        .slide-bg { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .swiper-slide-active .slide-bg { transform: scale(1.02); }
        .slide-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.1) 100%); }
        .slide-description-card { position: absolute; left: 60px; bottom: 80px; max-width: 520px; background: rgba(0,0,0,0.65); backdrop-filter: blur(16px); padding: 28px 32px; border-radius: 32px; border-left: 5px solid #e50914; z-index: 15; }
        .slide-description-card h2 { font-size: 38px; font-family: 'Playfair Display', serif; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, #fff, #e50914); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .slide-meta { display: flex; gap: 20px; margin-bottom: 14px; font-size: 14px; color: #ddd; }
        .rating { color: #f5c518; font-weight: 600; }
        .slide-description-card p { font-size: 15px; line-height: 1.5; margin-bottom: 18px; color: #e0e0e0; }
        .slide-cast { font-size: 13px; color: #bbb; margin-bottom: 22px; }
        .btn-watch { background: #e50914; border: none; padding: 12px 32px; border-radius: 50px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.25s; display: inline-flex; align-items: center; gap: 10px; }
        .btn-watch:hover { background: #b81d24; transform: scale(1.02); }
        .slider-static-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; width: 90%; max-width: 700px; pointer-events: none; }
        .slider-static-content h1 { font-size: 64px; font-weight: 800; background: linear-gradient(135deg, #fff, #e50914); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -1px; margin-bottom: 20px; pointer-events: none; }
        .slider-search { pointer-events: auto; }
        .slider-search input { width: 80%; max-width: 500px; padding: 14px 24px; border-radius: 60px; border: none; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); color: white; font-size: 16px; outline: none; text-align: center; border: 1px solid rgba(255,255,255,0.3); }
        .slider-search input:focus { background: rgba(0,0,0,0.8); border-color: #e50914; }
        .section-header { display: flex; justify-content: space-between; align-items: baseline; margin: 40px 0 20px; flex-wrap: wrap; }
        .section-title { font-size: 24px; font-weight: 700; border-left: 4px solid #e50914; padding-left: 15px; }
        .pagination-controls { display: flex; gap: 8px; }
        .page-btn { background: #1e2026; border: none; padding: 6px 14px; border-radius: 30px; color: #ccc; cursor: pointer; }
        .page-btn.active, .page-btn:hover { background: #e50914; color: white; }
        .movies-grid, .tv-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 20px; margin-bottom: 30px; }
        .movie-card, .tv-card { background: #181a24; border-radius: 14px; overflow: hidden; transition: transform 0.25s; cursor: pointer; position: relative; }
        .movie-card:hover, .tv-card:hover { transform: translateY(-6px); box-shadow: 0 12px 20px rgba(0,0,0,0.4); }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 12px; }
        .card-info h4 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info p { font-size: 12px; color: #aaa; }
        .favorite-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; transition: 0.2s; }
        .favorite-btn i { font-size: 18px; }
        .favorite-btn i.fas { color: #e50914; }
        .favorite-btn i.far { color: #fff; }
        .favorite-btn:hover { transform: scale(1.1); background: rgba(0,0,0,0.8); }
        .preview-rich { position: fixed; width: 480px; background: #1a1c22; border-radius: 20px; overflow: hidden; z-index: 2000; border: 1px solid #e50914; box-shadow: 0 20px 35px rgba(0,0,0,0.6); pointer-events: auto; }
        .preview-trailer iframe { width: 100%; height: 270px; border: none; }
        .preview-info { padding: 16px; }
        .preview-info h4 { font-size: 18px; margin-bottom: 8px; color: #e50914; }
        .preview-info p { font-size: 14px; color: #ccc; }
        .footer { margin-top: 60px; background: #0c0e12; border-radius: 30px 30px 0 0; padding: 40px 30px 20px; }
        .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 40px; }
        .footer-logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg,#fff,#e50914); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .social-links a { margin-right: 15px; color: #ccc; text-decoration: none; }
        .disclaimer { font-size: 12px; color: #888; background: #1a1c22; padding: 12px; border-radius: 12px; margin-top: 15px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #e50914; padding: 10px 20px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 3500; }
        .toast.show { opacity: 1; }
        .modal { display: none; position: fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:3000;align-items:center;justify-content:center; }
        .modal-content { background:#1e2026; max-width:400px; width:90%; border-radius:24px; padding:24px; }
        .close-modal { float:right; font-size:28px; cursor:pointer; }
        .auth-form { display:flex; flex-direction:column; gap:12px; margin-top:20px; }
        .auth-form input { padding:10px; border-radius:30px; border:none; background:#2a2c30; color:white; }
        .btn-primary { background:#e50914; border:none; padding:10px; border-radius:30px; color:white; cursor:pointer; }
        .favorites-section { display: none; margin-top: 20px; }
        .favorites-section.active { display: block; }
        .back-to-home { display: inline-block; margin-bottom: 20px; background: #1e2026; padding: 8px 20px; border-radius: 30px; cursor: pointer; transition: 0.2s; }
        .back-to-home:hover { background: #e50914; }
        
        /* Mobile adjustments */
        @media (max-width: 768px) {
            .sidebar { position: fixed; bottom: 0; top: auto; left: 0; width: 100%; height: 65px; flex-direction: row; justify-content: space-around; padding: 8px 10px; background: rgba(10,10,15,0.98); border-right: none; border-top: 1px solid rgba(255,255,255,0.08); z-index: 200; }
            .sidebar-top, .sidebar-bottom { flex-direction: row; gap: 20px; margin: 0; }
            .sidebar a span { display: none; }
            .sidebar a i { font-size: 24px; }
            .main { margin-left: 0; padding: 15px 12px; max-width: 100%; margin-bottom: 65px; }
            .swiper { height: 400px; }
            .slide-description-card { left: 15px; bottom: 20px; max-width: calc(100% - 30px); padding: 16px; }
            .slide-description-card h2 { font-size: 24px; }
            .slide-meta { gap: 12px; font-size: 11px; flex-wrap: wrap; }
            .slide-description-card p { font-size: 12px; }
            .slide-cast { font-size: 10px; }
            .btn-watch { padding: 8px 20px; font-size: 14px; }
            .slider-static-content h1 { font-size: 28px; margin-bottom: 10px; }
            .slider-search input { padding: 10px 16px; font-size: 14px; width: 90%; }
            .section-title { font-size: 20px; }
            .movies-grid, .tv-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .card-info h4 { font-size: 12px; }
            .card-info p { font-size: 10px; }
            .preview-rich { display: none; }
            .footer-content { grid-template-columns: 1fr; text-align: center; }
        }
        @media (max-width: 480px) {
            .movies-grid, .tv-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    (function() {
        const API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
        const BASE = 'https://api.themoviedb.org/3';
        const IMG = 'https://image.tmdb.org/t/p/w500';
        const BACKDROP = 'https://image.tmdb.org/t/p/original';
        let swiper = null;
        let activePreview = null;
        let previewTimeout = null;
        let currentCard = null;

        // =============== FAVORITES LOGIC ===============
        let favorites = JSON.parse(localStorage.getItem('alb_favorites')) || [];

        function saveFavorites() {
            localStorage.setItem('alb_favorites', JSON.stringify(favorites));
        }

        function isFavorite(id, type) {
            return favorites.some(f => f.id == id && f.type === type);
        }

        function updateButtonIcon(btn, isFav) {
            const icon = btn.querySelector('i');
            if (icon) {
                if (isFav) icon.className = 'fas fa-heart';
                else icon.className = 'far fa-heart';
            }
        }

        function updateAllFavoriteIcons(id, type, isFav) {
            const btns = document.querySelectorAll(`.favorite-btn[data-id="${id}"][data-type="${type}"]`);
            btns.forEach(btn => updateButtonIcon(btn, isFav));
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function addFavorite(item) {
            if (!isFavorite(item.id, item.type)) {
                favorites.push({ id: item.id, type: item.type, title: item.title, poster: item.poster });
                saveFavorites();
                showToast(`❤️ "${item.title}" added to favorites`);
                updateAllFavoriteIcons(item.id, item.type, true);
                if (document.getElementById('favoritesSection').classList.contains('active')) displayFavorites();
            }
        }

        function removeFavorite(id, type) {
            const favItem = favorites.find(f => f.id == id && f.type === type);
            if (favItem) {
                favorites = favorites.filter(f => !(f.id == id && f.type === type));
                saveFavorites();
                showToast(`💔 Removed from favorites`);
                updateAllFavoriteIcons(id, type, false);
                if (document.getElementById('favoritesSection').classList.contains('active')) displayFavorites();
            }
        }

        function toggleFavorite(id, type, title, poster, btnElement) {
            if (isFavorite(id, type)) {
                removeFavorite(id, type);
                if (btnElement) updateButtonIcon(btnElement, false);
            } else {
                addFavorite({ id, type, title, poster });
                if (btnElement) updateButtonIcon(btnElement, true);
            }
        }

        function displayFavorites() {
            const container = document.getElementById('favoritesGrid');
            if (!container) return;
            container.innerHTML = '';
            if (favorites.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">No favorites yet. Click the ❤️ on movies or series to add them.</div>';
                return;
            }
            favorites.forEach(fav => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('data-id', fav.id);
                card.setAttribute('data-type', fav.type);
                card.innerHTML = `
                    <div class="favorite-btn" data-id="${fav.id}" data-type="${fav.type}" data-title="${fav.title.replace(/'/g, "\\'")}" data-poster="${fav.poster || ''}">
                        <i class="fas fa-heart"></i>
                    </div>
                    <img class="poster" src="${fav.poster ? IMG+fav.poster : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${fav.title}">
                    <div class="card-info"><h4>${fav.title}</h4><p>⭐ Favorite</p></div>
                `;
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.favorite-btn')) return;
                    if (fav.type === 'tv') window.location.href = `tv.html?id=${fav.id}`;
                    else window.location.href = `watch.html?id=${fav.id}&type=movie`;
                });
                const favBtn = card.querySelector('.favorite-btn');
                favBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFavorite(fav.id, fav.type);
                    displayFavorites();
                });
                container.appendChild(card);
            });
        }

        // =============== PREVIEW (desktop only) ===============
        function showRichPreview(item, cardEl, isTv) {
            if (window.innerWidth <= 768) return;
            if (activePreview && currentCard === cardEl) return;
            removePreview();
            currentCard = cardEl;
            const id = item.id;
            const type = isTv ? 'tv' : 'movie';
            fetch(`${BASE}/${type}/${id}?api_key=${API_KEY}&language=en-US`).then(r=>r.json()).then(details => {
                fetch(`${BASE}/${type}/${id}/videos?api_key=${API_KEY}`).then(r=>r.json()).then(videos => {
                    const trailer = videos.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                    const title = details.title || details.name;
                    const year = (details.release_date || details.first_air_date || '').split('-')[0] || 'N/A';
                    const rating = details.vote_average ? details.vote_average.toFixed(1) : 'N/A';
                    const overview = details.overview ? details.overview.substring(0, 180) : 'No description';
                    const preview = document.createElement('div');
                    preview.className = 'preview-rich';
                    preview.innerHTML = `
                        <div class="preview-trailer">
                            ${trailer ? `<iframe src="https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>` : '<div style="height:270px; background:#111; display:flex; align-items:center; justify-content:center;">🎬 No trailer</div>'}
                        </div>
                        <div class="preview-info">
                            <h4>${title} (${year})</h4>
                            <p>⭐ ${rating}/10</p>
                            <p>${overview}...</p>
                        </div>
                    `;
                    document.body.appendChild(preview);
                    activePreview = preview;
                    const rect = cardEl.getBoundingClientRect();
                    let left = rect.left + rect.width + 15;
                    let top = rect.top + window.scrollY;
                    if (left + 480 > window.innerWidth) left = rect.left - 490;
                    if (top + 400 > window.innerHeight + window.scrollY) top = window.innerHeight + window.scrollY - 420;
                    preview.style.top = top + 'px';
                    preview.style.left = left + 'px';
                    preview.addEventListener('mouseenter', () => { if (previewTimeout) clearTimeout(previewTimeout); });
                    preview.addEventListener('mouseleave', () => {
                        previewTimeout = setTimeout(() => { removePreview(); currentCard = null; }, 300);
                    });
                }).catch(e => console.error(e));
            }).catch(e => console.error(e));
        }

        function removePreview() {
            if (activePreview) { activePreview.remove(); activePreview = null; }
            if (previewTimeout) clearTimeout(previewTimeout);
        }

        // =============== CREATE CARD ===============
        function createCard(item, isTv, containerId) {
            const card = document.createElement('div');
            card.className = isTv ? 'tv-card' : 'movie-card';
            const id = item.id;
            const type = isTv ? 'tv' : 'movie';
            const title = item.title || item.name;
            const year = (item.release_date || item.first_air_date || '').split('-')[0] || 'N/A';
            const rating = item.vote_average ? item.vote_average.toFixed(1) : '?';
            const poster = item.poster_path || '';
            const isFav = isFavorite(id, type);
            card.innerHTML = `
                <div class="favorite-btn" data-id="${id}" data-type="${type}" data-title="${title.replace(/'/g, "\\'")}" data-poster="${poster}">
                    <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                </div>
                <img class="poster" src="${poster ? IMG+poster : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${title}">
                <div class="card-info">
                    <h4>${title}</h4>
                    <p>${year} ⭐ ${rating}</p>
                </div>
            `;
            let hoverTimeout;
            card.addEventListener('mouseenter', () => {
                if (window.innerWidth > 768) {
                    hoverTimeout = setTimeout(() => showRichPreview(item, card, isTv), 400);
                }
            });
            card.addEventListener('mouseleave', () => {
                clearTimeout(hoverTimeout);
                if (window.innerWidth > 768) {
                    setTimeout(() => {
                        if (activePreview && !activePreview.matches(':hover') && !card.matches(':hover')) {
                            removePreview();
                            currentCard = null;
                        }
                    }, 100);
                }
            });
            card.addEventListener('click', (e) => {
                if (e.target.closest('.favorite-btn')) return;
                if (isTv) window.location.href = `tv.html?id=${id}`;
                else window.location.href = `watch.html?id=${id}&type=movie`;
            });
            const favBtn = card.querySelector('.favorite-btn');
            favBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite(id, type, title, poster, favBtn);
            });
            document.getElementById(containerId).appendChild(card);
        }

        // =============== LOAD MOVIES, TV SHOWS, HERO SLIDER, SEARCH (unchanged) ===============
        async function loadGenreMovies(genreId, gridId, pagId, page = 1) {
            const grid = document.getElementById(gridId);
            if (!grid) return;
            if (page === 1) grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;">Loading...</div>';
            try {
                const res = await fetch(`${BASE}/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&sort_by=popularity.desc&vote_count.gte=100&language=en-US&page=${page}`);
                const data = await res.json();
                const totalPages = Math.min(data.total_pages, 5);
                if (page === 1) grid.innerHTML = '';
                data.results.forEach(m => createCard(m, false, gridId));
                const pagContainer = document.getElementById(pagId);
                if (pagContainer && page === 1) {
                    pagContainer.innerHTML = '';
                    for (let i = 1; i <= totalPages; i++) {
                        const btn = document.createElement('button');
                        btn.textContent = i;
                        btn.className = `page-btn ${i === page ? 'active' : ''}`;
                        btn.onclick = () => { grid.innerHTML = ''; loadGenreMovies(genreId, gridId, pagId, i); };
                        pagContainer.appendChild(btn);
                    }
                }
            } catch(e) { console.error(e); grid.innerHTML = '<div>Error</div>'; }
        }
